<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Super WebDev Pro</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div>
        <div class="header-title-container">
          <span class="header-logo">⚡</span>
          <h1>SuperDev Pro</h1>
        </div>
        <p class="header-subtitle">All-in-one Browser DevTools</p>
      </div>
    </div>

    <!-- Status Alerts -->
    <div id="status-alert" class="status-msg"></div>

    <!-- Tools Grid -->
    <div id="content-tools" class="tab-content active">
      <!-- Category 1: Inspect & Edit -->
      <div class="category-section">
        <h2 class="category-title">Inspect & Edit</h2>
        <div class="features-grid">
          <button id="css-inspector" class="feature-button">
            <span class="icon">🔍</span>
            <span>CSS Inspector</span>
          </button>
          <button id="live-text-editor" class="feature-button">
            <span class="icon">📝</span>
            <span>Text Editor</span>
          </button>
          <button id="export-element" class="feature-button">
            <span class="icon">📤</span>
            <span>Export Element</span>
          </button>
          <button id="image-replacer" class="feature-button">
            <span class="icon">🔄</span>
            <span>Image Swap</span>
          </button>
        </div>
      </div>

      <!-- Category 2: Colors & Typography -->
      <div class="category-section">
        <h2 class="category-title">Colors & Fonts</h2>
        <div class="features-grid">
          <button id="color-picker" class="feature-button">
            <span class="icon">🎨</span>
            <span>Color Picker</span>
          </button>
          <button id="color-palette" class="feature-button">
            <span class="icon">🌈</span>
            <span>Color Palette</span>
          </button>
          <button id="fonts-changer" class="feature-button">
            <span class="icon">🔤</span>
            <span>Font Changer</span>
          </button>
          <button id="list-fonts" class="feature-button">
            <span class="icon">📋</span>
            <span>List Fonts</span>
          </button>
        </div>
      </div>

      <!-- Category 3: Layout & Actions -->
      <div class="category-section">
        <h2 class="category-title">Layout & Screenshot</h2>
        <div class="features-grid">
          <button id="page-ruler" class="feature-button">
            <span class="icon">📏</span>
            <span>Page Ruler</span>
          </button>
          <button id="page-outliner" class="feature-button">
            <span class="icon">🔲</span>
            <span>Outliner</span>
          </button>
          <button id="move-element" class="feature-button">
            <span class="icon">🖱️</span>
            <span>Move Element</span>
          </button>
          <button id="delete-element" class="feature-button">
            <span class="icon">🗑️</span>
            <span>Delete Element</span>
          </button>
          <button id="extract-images" class="feature-button">
            <span class="icon">🖼️</span>
            <span>Extract Images</span>
          </button>
          <button id="take-screenshot" class="feature-button">
            <span class="icon">📸</span>
            <span>Screenshot</span>
          </button>
        </div>
      </div>

      <!-- Category 4: Diagnostics -->
      <div class="category-section">
        <h2 class="category-title">Diagnostics</h2>
        <div class="features-grid">
          <button id="tech-stack" class="feature-button">
            <span class="icon">💻</span>
            <span>Tech Stack</span>
          </button>
          <button id="seo-meta" class="feature-button">
            <span class="icon">🏷️</span>
            <span>SEO Meta</span>
          </button>
          <button id="a11y-audit" class="feature-button">
            <span class="icon">♿</span>
            <span>A11y Audit</span>
          </button>
          <button id="responsive-viewer" class="feature-button">
            <span class="icon">📱</span>
            <span>Responsive</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Links -->
  <div class="footer" style="flex-direction: column; gap: 6px; align-items: stretch; text-align: center;">
    <div style="font-size: 10px; color: var(--text-secondary); margin-bottom: 4px;">
      💡 Press <b>Cmd/Ctrl+Shift+E</b> to toggle the sidebar directly on any page!
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 8px;">
      <span>v1.0.0</span>
      <a href="https://fineanmol.github.io/Super-WebDev-Pro/privacy-policy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
